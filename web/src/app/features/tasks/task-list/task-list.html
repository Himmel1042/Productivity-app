<div class="app-container">

  <h1>📝 Productivity App</h1>

  <form [formGroup]="form" (ngSubmit)="add()" class="task-form">
    <input type="text" formControlName="title" placeholder="What needs to be done?" />

    <select formControlName="priority">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>

    <button type="submit" [disabled]="form.invalid">Add Task</button>
  </form>

  @if (loading) {
  <div class="status loading">Loading tasks...</div>
  }

  @if (error) {
  <div class="status error">Error loading tasks 😢</div>
  }

  @if (tasks$ | async; as tasks) {

  <div class="tasks-list">

    @if (tasks.length === 0) {
    <div class="empty">
      No tasks yet! 🎉
    </div>
    }

    @for (task of tasks; track task.id) {
    <div class="task-card" [class.completed]="task.completed">

      <input type="checkbox" [checked]="task.completed" (change)="toggle(task)" />

      @if (editingTaskId === task.id) {
      <input type="text" [(ngModel)]="editTitle" class="edit-input" />
      <button (click)="saveEdit(task)">💾 Save</button>
      <button (click)="cancelEdit()">✖ Cancel</button>
      } @else {
      <span class="task-title">{{ task.title }}</span>
      <span class="task-priority" [class]="task.priority">{{ task.priority }}</span>
      <button (click)="startEdit(task)">✏️ Edit</button>
      <button class="delete-btn" (click)="delete(task.id)">❌</button>
      }

    </div>
    }

  </div>

  }

</div>
